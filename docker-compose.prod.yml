networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:

services:
  client:
    image: ghcr.io/${{ env.IMAGE_PREFIX }}/school-client:latest
    ports:
      - "80:5173"
    networks:
      - app-network
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ghcr.io/${{ env.IMAGE_PREFIX }}/school-server:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - app-network
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: ghcr.io/${{ env.IMAGE_PREFIX }}/school-db:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped
